name: Build TraceRT APK

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:

jobs:
  build:
    name: Build installable APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Create Environment Secrets File
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            touch .env
          fi

      - name: Restore or Generate Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Restoring debug keystore from base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          elif [ -f debug.keystore ]; then
            echo "debug.keystore already exists."
          else
            echo "Generating a new debug keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Android App with Gradle
        run: gradle assembleDebug

      - name: Archive and Publish TraceRT APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tracert-offline-hike-tracker-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7
